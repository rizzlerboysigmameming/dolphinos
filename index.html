<!DOCTYPE html>
<html>
<head>
  <title>DolphinOS</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      overflow: hidden;
    }

    /* TASKBAR */
    .taskbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 45px;
      background: rgba(0,0,0,0.6);
      color: white;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }

    /* ICONS */
    .icon {
      width: 80px;
      text-align: center;
      color: white;
      margin: 20px;
      cursor: pointer;
      display: inline-block;
    }

    .icon div:first-child {
      font-size: 30px;
    }

    /* WINDOW */
    .window {
      position: absolute;
      top: 80px;
      left: 80px;
      width: 320px;
      height: 220px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
    }

    .titlebar {
      background: #222;
      color: white;
      padding: 5px;
      display: flex;
      justify-content: space-between;
      cursor: move;
    }

    .content {
      padding: 10px;
      flex: 1;
      overflow: auto;
    }

    .close {
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- ICONS -->
<div class="icon" onclick="openBrowser()">
  <div>🌐</div><div>Browser</div>
</div>

<div class="icon" onclick="openFiles()">
  <div>📁</div><div>Files</div>
</div>

<div class="icon" onclick="openCamera()">
  <div>📷</div><div>Camera</div>
</div>

<!-- TASKBAR -->
<div class="taskbar">
  🐬 DolphinOS v0.2
</div>

<script>

let files = {
  "readme.dol": "Welcome to DolphinOS",
  "notes.dol": "This is your file system"
};

function createWindow(title, content) {
  const win = document.createElement("div");
  win.className = "window";

  win.innerHTML = `
    <div class="titlebar">
      <span>${title}</span>
      <span class="close">✖</span>
    </div>
    <div class="content">${content}</div>
  `;

  win.querySelector(".close").onclick = () => win.remove();

  document.body.appendChild(win);
}

/* 🌐 BROWSER */
function openBrowser() {
  createWindow("Dolphin Browser", `
    <input id="url" placeholder="Enter URL" style="width:100%">
    <button onclick="go()">Go</button>
    <iframe id="frame" style="width:100%;height:140px;"></iframe>
  `);

  setTimeout(() => {
    window.go = function () {
      let url = document.getElementById("url").value;
      if (!url.startsWith("http")) url = "https://" + url;
      document.getElementById("frame").src = url;
    }
  }, 100);
}

/* 📁 FILE SYSTEM */
function openFiles() {
  let list = "";
  for (let f in files) {
    list += `<div onclick="openFile('${f}')">📄 ${f}</div>`;
  }
  createWindow("Files", list);
}

function openFile(name) {
  createWindow(name, `
    <textarea style="width:100%;height:150px;">${files[name]}</textarea>
  `);
}

/* 📷 CAMERA */
function openCamera() {
  createWindow("Camera", `
    <video id="video" autoplay style="width:100%"></video>
  `);

  setTimeout(async () => {
    const video = document.getElementById("video");
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
  }, 100);
}

</script>

</body>
</html>
