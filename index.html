<!DOCTYPE html>
<html>
<head>
  <title>DolphinOS</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      overflow: hidden;
    }

    /* TASKBAR */
    .taskbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 45px;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      padding: 0 10px;
      color: white;
      gap: 10px;
    }

    .startbtn {
      background: #00aaff;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .taskbtn {
      background: rgba(255,255,255,0.2);
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
    }

    /* START MENU */
    .startmenu {
      position: fixed;
      bottom: 45px;
      left: 10px;
      width: 200px;
      background: white;
      border-radius: 10px;
      display: none;
      flex-direction: column;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .startmenu div {
      padding: 10px;
      cursor: pointer;
    }

    .startmenu div:hover {
      background: #eee;
    }

    /* WINDOW */
    .window {
      position: absolute;
      width: 350px;
      height: 250px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      resize: both;
      overflow: hidden;
    }

    .titlebar {
      background: #222;
      color: white;
      padding: 5px;
      display: flex;
      justify-content: space-between;
      cursor: move;
    }

    .content {
      padding: 10px;
      flex: 1;
      overflow: auto;
    }

    .close { cursor: pointer; }

    /* ICONS */
    .icon {
      width: 80px;
      text-align: center;
      color: white;
      margin: 20px;
      cursor: pointer;
      display: inline-block;
    }

    .icon div:first-child { font-size: 30px; }

  </style>
</head>

<body>

<!-- ICONS -->
<div class="icon" onclick="openApp('files')">
  <div>📁</div><div>Files</div>
</div>

<div class="icon" onclick="openApp('settings')">
  <div>⚙️</div><div>Settings</div>
</div>

<div class="icon" onclick="openApp('browser')">
  <div>🌐</div><div>Browser</div>
</div>

<!-- START MENU -->
<div class="startmenu" id="startmenu">
  <div onclick="openApp('files')">📁 File Explorer</div>
  <div onclick="openApp('browser')">🌐 Browser</div>
  <div onclick="openApp('settings')">⚙️ Settings</div>
</div>

<!-- TASKBAR -->
<div class="taskbar">
  <div class="startbtn" onclick="toggleStart()">🐬 Dolphin</div>
  <div id="tasks"></div>
</div>

<script>

let apps = {};
let z = 1;
let storageUsed = 2; // fake GB

/* START MENU */
function toggleStart() {
  const sm = document.getElementById("startmenu");
  sm.style.display = sm.style.display === "flex" ? "none" : "flex";
}

/* WINDOW SYSTEM */
function createWindow(id, title, content) {
  if (apps[id]) {
    apps[id].style.display = "flex";
    bringToFront(apps[id]);
    return;
  }

  const win = document.createElement("div");
  win.className = "window";
  win.style.zIndex = z++;

  win.innerHTML = `
    <div class="titlebar">
      <span>${title}</span>
      <span class="close">✖</span>
    </div>
    <div class="content">${content}</div>
  `;

  document.body.appendChild(win);
  apps[id] = win;

  win.querySelector(".close").onclick = () => {
    win.remove();
    delete apps[id];
    removeTask(id);
  };

  drag(win);
  addTask(id, title, win);
  bringToFront(win);
}

/* DRAG */
function drag(win) {
  const bar = win.querySelector(".titlebar");
  let dx, dy, down = false;

  bar.onmousedown = e => {
    down = true;
    dx = e.clientX - win.offsetLeft;
    dy = e.clientY - win.offsetTop;
    bringToFront(win);
  };

  document.onmousemove = e => {
    if (!down) return;
    win.style.left = (e.clientX - dx) + "px";
    win.style.top = (e.clientY - dy) + "px";
  };

  document.onmouseup = () => down = false;
}

function bringToFront(w) {
  w.style.zIndex = z++;
}

/* TASKBAR */
function addTask(id, title, win) {
  const t = document.createElement("div");
  t.className = "taskbtn";
  t.innerText = title;

  t.onclick = () => {
    win.style.display = "flex";
    bringToFront(win);
  };

  t.id = "task-" + id;
  document.getElementById("tasks").appendChild(t);
}

function removeTask(id) {
  const el = document.getElementById("task-" + id);
  if (el) el.remove();
}

/* APPS */

/* 📁 FILE EXPLORER */
function openApp(type) {

  if (type === "files") {
    createWindow("files", "File Explorer", `
      <h3>Storage: ${storageUsed}/10 GB</h3>
      <div onclick="openFile('readme.dol')">📄 readme.dol</div>
      <div onclick="openFile('notes.dol')">📄 notes.dol</div>
    `);
  }

  if (type === "settings") {
    createWindow("settings", "Settings", `
      <h3>DolphinOS Settings</h3>
      <p>Storage used: ${storageUsed} GB</p>
      <p>Theme: Blue Ocean</p>
    `);
  }

  if (type === "browser") {
    createWindow("browser", "Dolphin Browser", `
      <input id="url" style="width:100%" placeholder="Enter URL">
      <button onclick="go()">Go</button>
      <iframe id="frame" style="width:100%;height:150px;"></iframe>
    `);

    setTimeout(() => {
      window.go = function () {
        let url = document.getElementById("url").value;
        if (!url.startsWith("http")) url = "https://" + url;
        document.getElementById("frame").src = url;
      }
    }, 100);
  }
}

/* FILE OPEN */
function openFile(name) {
  createWindow(name, name, `<textarea style="width:100%;height:180px;">Dolphin file content</textarea>`);
}

</script>

</body>
</html>
